<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타자연습</title>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f7f4ee;
    --panel:#ffffff;
    --accent:#3a5a40;
    --accent-2:#c8a24a;
    --correct:#3a5a40;
    --wrong:#b3432b;
    --muted:#8b8578;
    --line:#ddd6c7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 2.2em;
    font-family:"Noto Sans KR","Malgun Gothic",sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
  }
  .card{
    width:100%;
    max-width:760px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:0 12px 30px rgba(30,25,15,0.08);
    padding:40px;
    position:relative;
    transition: max-width 0.25s ease;
  }
  .card.wide{ max-width:1040px; }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--accent-2);
    font-weight:700;
    margin-bottom:6px;
  }
  h1{
    font-size:28px;
    margin:0 0 28px 0;
    font-weight:800;
    letter-spacing:-0.02em;
  }

  /* 닉네임 입력 화면 */
  #nameScreen{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  #nameScreen p{
    color:var(--muted);
    margin:0 0 8px 0;
    font-size:14px;
  }
  input[type="text"]{
    font-size:18px;
    padding:14px 16px;
    border:1.5px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
    outline:none;
    font-family:inherit;
  }
  input[type="text"]:focus{
    border-color:var(--accent);
  }
  button{
    font-family:inherit;
    font-size:16px;
    font-weight:700;
    padding:14px 20px;
    border:none;
    border-radius:3px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    letter-spacing:0.02em;
  }
  button:hover{ filter:brightness(1.08); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }

  /* 로딩 */
  #loadStatus{
    font-size:13px;
    color:var(--muted);
  }

  /* 타자 화면 */
  #typeScreen{ display:none; }

  .stat-bar{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
    font-size:13px;
    color:var(--muted);
  }
  .stat-bar .who{
    font-weight:700;
    color:var(--accent);
  }
  #timer{
    font-variant-numeric: tabular-nums;
    font-weight:700;
    color:var(--ink);
  }

  .line-viewport{
    position:relative;
    height:220px;
    overflow:hidden;
    margin-bottom:18px;
    mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
  }
  .line-track{
    position:absolute;
    left:0;
    right:0;
    top:0;
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }
  .line-block{
    padding:8px 4px 20px 4px;
    text-align:left;
    transition: opacity 0.45s ease;
  }
  .line-block .line-original{
    font-size:22px;
    line-height:1.6;
    letter-spacing:0.01em;
    color:var(--ink);
    word-break:keep-all;
    white-space:pre-wrap;
  }
  .line-block .line-typed{
    font-size:22px;
    line-height:1.6;
    letter-spacing:0.01em;
    color:var(--muted);
    word-break:keep-all;
    white-space:pre-wrap;
    min-height:1.6em;
  }
  .line-block.done{ opacity:0.32; }
  .line-block.upcoming{ opacity:0.28; }
  .line-block.upcoming .line-typed{ visibility:hidden; }
  .line-block.current .line-original{ color:var(--ink); font-weight:700; }

  .ch{ position:relative; }
  .ch.correct{ color:var(--correct); }
  .ch.wrong{ color:var(--wrong); background:rgba(179,67,43,0.12); border-radius:2px; }
  .ch.current{ border-bottom:3px solid var(--accent-2); }

  input.input-box{
    width:100%;
    font-size:22px;
    line-height:1.6;
    letter-spacing:0.01em;
    padding:14px 4px;
    border:none;
    border-bottom:2.5px solid var(--line);
    border-radius:0;
    background:transparent;
    color:var(--ink);
    font-family:inherit;
    outline:none;
    transition:border-color 0.2s ease;
  }
  input.input-box:focus{ border-color:var(--accent); }

  /* 실시간 통계 그래프 */
  .stats-panel{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .stat-row{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .stat-label{
    width:40px;
    flex-shrink:0;
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.05em;
  }
  .stat-bar-track{
    flex:1;
    height:9px;
    border-radius:99px;
    background:rgba(0,0,0,0.05);
    border:1px solid var(--line);
    overflow:hidden;
    position:relative;
  }
  .stat-bar-fill{
    height:100%;
    width:0%;
    border-radius:99px;
    background:#b9cdb4;
    transition: width 0.35s cubic-bezier(0.22,0.61,0.36,1), background 0.4s ease;
  }
  .stat-value{
    width:76px;
    flex-shrink:0;
    text-align:right;
    font-size:12px;
    font-variant-numeric: tabular-nums;
    color:var(--muted);
    font-weight:700;
  }

  /* 정확도 100% 달성 시 은은하게 빛나는 효과 */
  .stat-bar-fill.accuracy.glow{
    background:linear-gradient(90deg, #d8c98a, #f0e4b8, #d8c98a);
    background-size:200% 100%;
    animation: shimmerGlow 1.6s ease-in-out infinite;
    box-shadow:0 0 10px rgba(216,201,138,0.65);
  }
  @keyframes shimmerGlow{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
  }

  /* 타수 구간별 색상 */
  .stat-bar-fill.speed.s0{ background:#b9cdb4; }        /* ~400 미만 */
  .stat-bar-fill.speed.s1{ background:#a9c6dd; }        /* 400~499 */
  .stat-bar-fill.speed.s2{ background:#c3aee0; }        /* 500~599 */
  .stat-bar-fill.speed.s3{ background:#e3aecb; }        /* 600~699 */
  .stat-bar-fill.speed.s4{ background:#e7bd9a; }        /* 700~799 */
  .stat-bar-fill.speed.s5{
    background:linear-gradient(90deg, #ecd48e, #fbeeb8, #ecd48e);
    background-size:200% 100%;
    animation: shimmerGlow 1.4s ease-in-out infinite;
    box-shadow:0 0 10px rgba(236,212,142,0.6);
  }                                                      /* 800 이상 */

  /* 결과 화면 */
  #resultScreen{
    display:none;
    gap:32px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  #resultScreen.show{ display:flex; }
  .result-main{
    flex:2;
    min-width:280px;
  }

  .ranking-panel{
    flex:1;
    min-width:220px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:4px;
    padding:18px;
  }
  .ranking-title{
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent-2);
    font-weight:700;
    margin-bottom:14px;
  }
  .ranking-status{
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
  }
  .ranking-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .ranking-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .ranking-row:last-child{ border-bottom:none; }
  .ranking-row.me{
    background:rgba(200,162,74,0.12);
    border-radius:3px;
    padding:8px 8px;
  }
  .rk-rank{
    width:20px;
    flex-shrink:0;
    font-weight:800;
    color:var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .rk-info{
    flex:1;
    min-width:0;
  }
  .rk-nick{
    font-weight:700;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .rk-meta{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  .rk-speed{
    flex-shrink:0;
    font-weight:800;
    color:var(--accent);
    font-variant-numeric: tabular-nums;
    text-align:right;
  }
  .result-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin:24px 0;
  }
  .result-tile{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:18px;
  }
  .result-tile .label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .result-tile .value{
    font-size:26px;
    font-weight:800;
    color:var(--ink);
  }
  .result-tile .value.accent{ color:var(--accent); }

  .allow-select{
    user-select:text !important;
    -webkit-user-select:text !important;
  }

  .code-box{
    margin-top:20px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:14px 16px;
  }
  .code-label{
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
    margin-bottom:8px;
  }
  .code-hint{ font-weight:400; }
  .code-value{
    font-size:12px;
    line-height:1.6;
    color:var(--ink);
    word-break:break-all;
    letter-spacing:0.02em;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  }
  .code-note{
    margin-top:10px;
    font-size:11px;
    color:var(--muted);
  }

  .retry-btn{
    margin-top:14px;
    background:var(--ink);
  }

  .action-row{
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .action-row .retry-btn{ margin-top:0; }
  .copy-btn{
    background:transparent;
    color:var(--accent);
    border:1.5px solid var(--line);
    font-size:13px;
    font-weight:700;
    padding:11px 16px;
  }
  .copy-btn:hover{
    border-color:var(--accent);
    filter:none;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:36px;
    transform:translate(-50%, 16px);
    background:var(--ink);
    color:#fff;
    font-size:13px;
    font-weight:700;
    padding:12px 20px;
    border-radius:99px;
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index:1000;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%, 0);
  }
</style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="eyebrow">TYPING PRACTICE</div>
  <h1>타자연습</h1>

  <!-- 닉네임 입력 화면 -->
  <div id="nameScreen">
    <p>연습을 시작하기 전에 닉네임을 입력해 주세요.</p>
    <input type="text" id="nickInput" placeholder="닉네임" maxlength="20" autocomplete="off">
    <button id="startBtn">시작하기</button>
    <div id="loadStatus"></div>
  </div>

  <!-- 타자 연습 화면 -->
  <div id="typeScreen">
    <div class="stat-bar">
      <div><span class="who" id="nickDisplay"></span> 님, 화이팅!</div>
      <div>경과 시간 <span id="timer">0.0</span>초</div>
    </div>
    <div class="line-viewport" id="lineViewport">
      <div class="line-track" id="lineTrack"></div>
    </div>
    <input type="text" class="input-box" id="typeInput" placeholder="여기에 입력을 시작하면 타이머가 작동합니다" autocomplete="off" autocapitalize="off" spellcheck="false">

    <div class="stats-panel">
      <div class="stat-row">
        <div class="stat-label">정확도</div>
        <div class="stat-bar-track"><div class="stat-bar-fill accuracy" id="accuracyFill"></div></div>
        <div class="stat-value" id="accuracyValue">100%</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">타수</div>
        <div class="stat-bar-track"><div class="stat-bar-fill speed s0" id="speedFill"></div></div>
        <div class="stat-value" id="speedValue">0 타/분</div>
      </div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultScreen">
    <div class="result-main">
      <p style="color:var(--muted); font-size:14px; margin-bottom:0;">수고하셨습니다, <b id="resultNick" style="color:var(--accent);"></b> 님!</p>
      <div class="result-grid">
        <div class="result-tile">
          <div class="label">정확도</div>
          <div class="value accent" id="resultAccuracy">-</div>
        </div>
        <div class="result-tile">
          <div class="label">타자 속도</div>
          <div class="value accent" id="resultSpeed">-</div>
        </div>
        <div class="result-tile">
          <div class="label">걸린 시간</div>
          <div class="value" id="resultTime">-</div>
        </div>
        <div class="result-tile">
          <div class="label">닉네임</div>
          <div class="value" id="resultNick2">-</div>
        </div>
      </div>

      <div class="code-box">
        <div class="code-label">인증 코드 <span class="code-hint">(결과가 확정되는 순간 함께 고정됩니다)</span></div>
        <div class="code-value" id="seedDisplay"></div>
        <div class="code-note">이 코드는 check.html에서 해독할 수 있습니다.</div>
      </div>

      <div class="action-row">
        <button class="retry-btn" id="retryBtn">다시 하기</button>
        <button class="copy-btn" id="copyBtn" type="button">결과값 복사</button>
      </div>
    </div>

    <div class="ranking-panel">
      <div class="ranking-title">랭킹 TOP 10</div>
      <div class="ranking-list" id="rankingList">
        <div class="ranking-status">불러오는 중...</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">복사되었습니다!</div>

<script>
(function(){
  const SHEET_ID = "1gNjbTde-oDFcTlWLkeB2O7a9v-s_ql92QT45733jtWQ";

  // JSONP 방식으로 gviz API 호출 (CORS 제약 회피)
  function fetchViaJsonp(range, sheetName){
    return new Promise((resolve, reject) => {
      const callbackName = "__gvizCallback_" + Date.now() + "_" + Math.floor(Math.random()*100000);
      const script = document.createElement('script');

      const cleanup = () => {
        delete window[callbackName];
        if(script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timeoutId);
      };

      const timeoutId = setTimeout(() => {
        cleanup();
        reject(new Error("응답 시간 초과"));
      }, 10000);

      window[callbackName] = (json) => {
        cleanup();
        resolve(json);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("스크립트 로드 실패 (시트가 비공개이거나 존재하지 않을 수 있음)"));
      };

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`
        + `?tqx=out:json;responseHandler:${callbackName}`
        + (sheetName ? `&sheet=${encodeURIComponent(sheetName)}` : "")
        + (range ? `&range=${encodeURIComponent(range)}` : "");

      script.src = url;
      document.head.appendChild(script);
    });
  }

  const nameScreen = document.getElementById('nameScreen');
  const typeScreen = document.getElementById('typeScreen');
  const resultScreen = document.getElementById('resultScreen');
  const nickInput = document.getElementById('nickInput');
  const startBtn = document.getElementById('startBtn');
  const loadStatus = document.getElementById('loadStatus');
  const nickDisplay = document.getElementById('nickDisplay');
  const timerEl = document.getElementById('timer');
  const lineViewport = document.getElementById('lineViewport');
  const lineTrack = document.getElementById('lineTrack');
  const typeInput = document.getElementById('typeInput');
  const resultNick = document.getElementById('resultNick');
  const resultNick2 = document.getElementById('resultNick2');
  const resultAccuracy = document.getElementById('resultAccuracy');
  const resultSpeed = document.getElementById('resultSpeed');
  const resultTime = document.getElementById('resultTime');
  const seedDisplay = document.getElementById('seedDisplay');
  const retryBtn = document.getElementById('retryBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const rankingList = document.getElementById('rankingList');
  const mainCard = document.getElementById('mainCard');
  const accuracyFill = document.getElementById('accuracyFill');
  const accuracyValue = document.getElementById('accuracyValue');
  const speedFill = document.getElementById('speedFill');
  const speedValue = document.getElementById('speedValue');

  let sourceText = "";
  let nickname = "";
  let startTime = null;
  let timerInterval = null;
  let finished = false;
  let lastResult = null;

  let lines = [];
  let currentLineIndex = 0;
  let typedForLine = [];
  let totalCorrectJamo = 0;
  let totalRequiredJamo = 0;

  // 한 글자(음절/자모/일반 문자)를 입력하는 데 필요한 타수(자소 수)를 계산
  // 예: "한" -> ㅎ,ㅏ,ㄴ = 3타, "가" -> ㄱ,ㅏ = 2타, 영문/숫자/공백/기호 = 1타
  function countJamo(ch){
    const code = ch.charCodeAt(0);
    // 완성형 한글 음절 (가~힣)
    if(code >= 0xAC00 && code <= 0xD7A3){
      const offset = code - 0xAC00;
      const jong = offset % 28;
      return jong === 0 ? 2 : 3; // 종성 없으면 초성+중성 2타, 있으면 3타
    }
    // 낱개 자모(ㄱ~ㅎ, ㅏ~ㅣ)나 그 외 문자(영문/숫자/공백/기호)는 1타로 계산
    return 1;
  }

  function countLineJamo(line){
    let total = 0;
    for(const ch of line) total += countJamo(ch);
    return total;
  }

  async function loadSheetText(){
    loadStatus.textContent = "문장을 불러오는 중...";
    try{
      const json = await fetchViaJsonp("A1");

      if(json.status === "error"){
        const msg = (json.errors && json.errors[0] && json.errors[0].detailed_message) || "알 수 없는 오류";
        throw new Error(msg);
      }

      const rows = json.table && json.table.rows;
      if(!rows || !rows.length || !rows[0].c || !rows[0].c[0] || rows[0].c[0].v == null){
        throw new Error("A1 셀이 비어 있습니다.");
      }

      const cell = String(rows[0].c[0].v).trim();
      if(!cell){
        throw new Error("A1 셀이 비어 있습니다.");
      }

      sourceText = cell;
      loadStatus.textContent = "문장을 불러왔습니다. (" + sourceText.length + "자)";
      startBtn.disabled = false;
    }catch(e){
      loadStatus.innerHTML =
        "문장을 불러오지 못했습니다.<br>" +
        "확인 사항: 1) 공유 설정이 '링크가 있는 모든 사용자 - 뷰어'인지, " +
        "2) 스프레드시트가 삭제/이동되지 않았는지, 3) A1 셀에 내용이 있는지 확인해 주세요.<br>" +
        "<span style='font-size:11px;'>세부 오류: " + e.message + "</span>";
      startBtn.disabled = true;
    }
  }

  startBtn.disabled = true;
  loadSheetText();

  // "랭킹" 시트(A2부터: 번호,닉네임,타수,정확도,걸린시간,완료시각,인증코드)를 불러와
  // 타수 내림차순으로 정렬한 뒤 상위 10명만 표시
  async function loadRanking(){
    rankingList.innerHTML = `<div class="ranking-status">불러오는 중...</div>`;
    try{
      const json = await fetchViaJsonp("A2:G1000", "랭킹");

      if(json.status === "error"){
        const msg = (json.errors && json.errors[0] && json.errors[0].detailed_message) || "알 수 없는 오류";
        throw new Error(msg);
      }

      const rows = (json.table && json.table.rows) || [];
      const entries = [];

      rows.forEach(row => {
        const c = row.c || [];
        const getVal = (idx) => (c[idx] && c[idx].v != null) ? c[idx].v : null;

        const nick = getVal(1);
        const speed = Number(getVal(2));
        const accuracy = getVal(3);
        const elapsed = getVal(4);

        if(nick == null || nick === "" || isNaN(speed)) return; // 빈 행/불완전한 행은 제외

        entries.push({ nick: String(nick), speed, accuracy, elapsed });
      });

      if(entries.length === 0){
        rankingList.innerHTML = `<div class="ranking-status">아직 랭킹 데이터가 없습니다.</div>`;
        return;
      }

      entries.sort((a, b) => b.speed - a.speed);
      const top10 = entries.slice(0, 10);

      rankingList.innerHTML = top10.map((entry, idx) => {
        const accuracyText = entry.accuracy != null && entry.accuracy !== "" ? entry.accuracy + "%" : "-";
        const elapsedText = entry.elapsed != null && entry.elapsed !== "" ? entry.elapsed + "초" : "-";
        return `
          <div class="ranking-row">
            <div class="rk-rank">${idx + 1}</div>
            <div class="rk-info">
              <div class="rk-nick">${escapeHtml(entry.nick)}</div>
              <div class="rk-meta">${entry.speed}타/분 · 정확도 ${accuracyText} · ${elapsedText}</div>
            </div>
          </div>
        `;
      }).join("");
    }catch(e){
      rankingList.innerHTML = `<div class="ranking-status">랭킹을 불러오지 못했습니다.<br>(${escapeHtml(e.message)})</div>`;
    }
  }

  startBtn.addEventListener('click', () => {
    const nick = nickInput.value.trim();
    if(!nick){
      nickInput.focus();
      return;
    }
    if(!sourceText){
      return;
    }
    nickname = nick;
    nickDisplay.textContent = nickname;
    nameScreen.style.display = 'none';
    typeScreen.style.display = 'block';

    lines = buildLines(sourceText);
    currentLineIndex = 0;
    typedForLine = new Array(lines.length).fill("");
    totalCorrectJamo = 0;
    totalRequiredJamo = lines.reduce((sum, l) => sum + countLineJamo(l), 0);

    typeInput.value = "";
    typeInput.disabled = false;
    renderTrack();
    resetLiveStatsDisplay();
    setTimeout(() => typeInput.focus(), 50);
  });

  // 현재 박스 너비에 맞춰 단어(어절) 단위로 자연스럽게 줄바꿈, 공백 없는 긴 단어는 글자 단위로 강제 개행
  function buildLines(text){
    const availableWidth = lineViewport.clientWidth - 8; // line-block 좌우 패딩 보정
    const measurer = document.createElement('span');
    measurer.style.position = 'absolute';
    measurer.style.visibility = 'hidden';
    measurer.style.whiteSpace = 'nowrap';
    measurer.style.fontSize = '22px';
    measurer.style.letterSpacing = '0.01em';
    measurer.style.fontFamily = getComputedStyle(document.body).fontFamily;
    document.body.appendChild(measurer);

    const fitsWidth = (s) => {
      measurer.textContent = s;
      return measurer.scrollWidth <= availableWidth;
    };

    // 공백이 없어서(또는 있어도) 한 줄에 안 들어가는 긴 단어를 글자 단위로 쪼갬
    const splitLongWord = (word) => {
      const pieces = [];
      let current = "";
      for(const ch of word){
        const test = current + ch;
        if(!fitsWidth(test) && current){
          pieces.push(current);
          current = ch;
        } else {
          current = test;
        }
      }
      if(current) pieces.push(current);
      return pieces;
    };

    const paragraphs = text.split('\n');
    const result = [];

    paragraphs.forEach(paragraph => {
      const words = paragraph.split(' ').filter(w => w.length > 0);
      if(words.length === 0){
        result.push("");
        return;
      }
      let current = "";
      words.forEach(word => {
        const test = current ? current + " " + word : word;

        if(fitsWidth(test)){
          current = test;
          return;
        }

        // 현재 줄에 단어를 못 붙임 -> 지금까지 쌓인 줄을 먼저 확정
        if(current) result.push(current);

        if(fitsWidth(word)){
          current = word;
        } else {
          // 단어 자체가 한 줄보다 긴 경우 글자 단위로 쪼개서 채움
          const pieces = splitLongWord(word);
          for(let i = 0; i < pieces.length - 1; i++){
            result.push(pieces[i]);
          }
          current = pieces[pieces.length - 1] || "";
        }
      });
      if(current) result.push(current);
    });

    document.body.removeChild(measurer);
    return result.length ? result : [text];
  }

  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderCurrentLineChars(line, typed){
    let html = "";
    for(let i = 0; i < line.length; i++){
      const ch = line[i];
      let cls = "ch";
      if(i < typed.length){
        cls += typed[i] === ch ? " correct" : " wrong";
      } else if(i === typed.length){
        cls += " current";
      }
      html += `<span class="${cls}">${escapeHtml(ch)}</span>`;
    }
    return html;
  }

  function renderTrack(){
    let html = "";
    lines.forEach((line, idx) => {
      let stateClass = "";
      let originalHtml;
      let typedHtml = "";

      if(idx < currentLineIndex){
        stateClass = "done";
        originalHtml = escapeHtml(line);
        typedHtml = escapeHtml(typedForLine[idx] || "");
      } else if(idx === currentLineIndex){
        stateClass = "current";
        const typed = typeInput.value;
        originalHtml = renderCurrentLineChars(line, typed);
        typedHtml = escapeHtml(typed);
      } else {
        stateClass = "upcoming";
        originalHtml = escapeHtml(line);
      }

      html += `<div class="line-block ${stateClass}" data-idx="${idx}">
        <div class="line-original">${originalHtml}</div>
        <div class="line-typed">${typedHtml}</div>
      </div>`;
    });

    lineTrack.innerHTML = html;
    scrollToCurrent();
  }

  function scrollToCurrent(){
    const currentEl = lineTrack.querySelector(`.line-block[data-idx="${currentLineIndex}"]`);
    if(!currentEl) return;
    const peek = 26; // 이전 줄이 위로 살짝 남아 보이도록
    const offset = Math.max(0, currentEl.offsetTop - peek);
    lineTrack.style.transform = `translateY(${-offset}px)`;
  }

  function resetLiveStatsDisplay(){
    accuracyFill.style.width = "0%";
    accuracyFill.classList.remove('glow');
    accuracyValue.textContent = "100%";
    speedFill.style.width = "0%";
    speedFill.classList.remove('s1','s2','s3','s4','s5');
    speedFill.classList.add('s0');
    speedValue.textContent = "0 타/분";
  }

  function startTimerIfNeeded(){
    if(startTime === null){
      startTime = performance.now();
      timerInterval = setInterval(() => {
        const elapsed = (performance.now() - startTime) / 1000;
        timerEl.textContent = elapsed.toFixed(1);
        updateLiveStats();
      }, 100);
    }
  }

  // 완료된 줄 + 현재 입력 중인 줄까지 포함해 실시간 정확도/타수를 계산해 그래프에 반영
  function updateLiveStats(){
    let typedJamo = 0;
    let correctJamo = 0;

    for(let i = 0; i < currentLineIndex; i++){
      const src = lines[i];
      const typed = typedForLine[i] || "";
      for(let j = 0; j < typed.length; j++){
        typedJamo += countJamo(typed[j]);
        if(typed[j] === src[j]) correctJamo += countJamo(src[j]);
      }
    }

    const src = lines[currentLineIndex] || "";
    const typed = typeInput.value;
    for(let j = 0; j < typed.length; j++){
      typedJamo += countJamo(typed[j]);
      if(typed[j] === src[j]) correctJamo += countJamo(src[j]);
    }

    const accuracy = typedJamo > 0 ? (correctJamo / typedJamo) * 100 : 100;
    const elapsedSec = startTime !== null ? (performance.now() - startTime) / 1000 : 0;
    const speed = elapsedSec > 0 ? Math.round(typedJamo / (elapsedSec / 60)) : 0;

    accuracyFill.style.width = Math.min(accuracy, 100).toFixed(1) + "%";
    accuracyValue.textContent = accuracy.toFixed(0) + "%";
    accuracyFill.classList.toggle('glow', typedJamo > 0 && accuracy >= 99.95);

    const speedPct = Math.min((speed / 900) * 100, 100);
    speedFill.style.width = speedPct.toFixed(1) + "%";
    speedValue.textContent = speed + " 타/분";

    let tier = 's0';
    if(speed >= 800) tier = 's5';
    else if(speed >= 700) tier = 's4';
    else if(speed >= 600) tier = 's3';
    else if(speed >= 500) tier = 's2';
    else if(speed >= 400) tier = 's1';
    speedFill.classList.remove('s0','s1','s2','s3','s4','s5');
    speedFill.classList.add(tier);
  }

  // 붙여넣기로 순식간에 입력하는 것을 방지
  typeInput.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const isPasteShortcut =
      ((e.ctrlKey || e.metaKey) && key === 'v') ||
      (e.shiftKey && key === 'insert');
    if(isPasteShortcut){
      e.preventDefault();
    }
  });

  typeInput.addEventListener('paste', (e) => {
    e.preventDefault();
  });
  typeInput.addEventListener('drop', (e) => {
    e.preventDefault();
  });
  typeInput.addEventListener('contextmenu', (e) => {
    // 우클릭 메뉴를 통한 붙여넣기도 차단
    e.preventDefault();
  });

  let isComposing = false;
  typeInput.addEventListener('compositionstart', () => {
    isComposing = true;
  });
  typeInput.addEventListener('compositionend', () => {
    isComposing = false;
    // 조합이 끝난 시점에 최신 값 기준으로 완료 여부를 다시 확인
    handleTypingInput();
  });

  typeInput.addEventListener('input', (e) => {
    if(e.isComposing || isComposing) {
      // 한글 조합 중에는 완료 처리를 하지 않고 화면만 갱신
      if(!finished) renderTrack();
      return;
    }
    handleTypingInput();
  });

  function handleTypingInput(){
    if(finished) return;
    startTimerIfNeeded();

    const line = lines[currentLineIndex];
    let typed = typeInput.value;

    if(typed.length >= line.length){
      // 이번 줄 완료: 정답 길이까지만 반영하고 다음 줄로 이동
      typed = typed.slice(0, line.length);
      typeInput.value = typed;

      let correctJamoInLine = 0;
      for(let i = 0; i < line.length; i++){
        if(typed[i] === line[i]) correctJamoInLine += countJamo(line[i]);
      }
      totalCorrectJamo += correctJamoInLine;
      typedForLine[currentLineIndex] = typed;

      if(currentLineIndex >= lines.length - 1){
        finishTyping();
        return;
      }

      currentLineIndex++;
      typeInput.value = "";
      renderTrack();
      updateLiveStats();
    } else {
      renderTrack();
      updateLiveStats();
    }
  }

  function finishTyping(){
    finished = true;
    clearInterval(timerInterval);
    typeInput.disabled = true;
    const elapsedSec = (performance.now() - startTime) / 1000;

    const accuracy = totalRequiredJamo > 0 ? (totalCorrectJamo / totalRequiredJamo) * 100 : 100;
    const minutes = elapsedSec / 60;
    const cpm = minutes > 0 ? Math.round(totalRequiredJamo / minutes) : totalRequiredJamo;

    const completedAt = new Date(); // 완료 시각(클라이언트 기준; 서버가 없어 클라이언트 시계를 사용)
    const code = encodeResultCode({
      nickname: nickname,
      speed: cpm,
      accuracy: Number(accuracy.toFixed(2)),
      elapsedSec: Number(elapsedSec.toFixed(2)),
      completedAt: completedAt.toISOString()
    });

    resultNick.textContent = nickname;
    resultNick2.textContent = nickname;
    resultAccuracy.textContent = accuracy.toFixed(1) + "%";
    resultSpeed.textContent = cpm + " 타/분";
    resultTime.textContent = elapsedSec.toFixed(2) + "초";
    seedDisplay.textContent = code;

    lastResult = {
      nickname: nickname,
      speed: cpm,
      accuracy: Number(accuracy.toFixed(2)),
      elapsedSec: Number(elapsedSec.toFixed(2)),
      completedAt: completedAt.toISOString(),
      code: code
    };

    typeScreen.style.display = 'none';
    mainCard.classList.add('wide');
    resultScreen.classList.add('show');

    loadRanking();
  }

  // ---- 인증 코드 (가역적 암호화) ----
  // 닉네임 / 타수 / 정확도 / 걸린 시간 / 완료 시각을 솔트(42)와 함께 뒤섞어 코드로 만들고,
  // 나중에 같은 규칙으로 되돌려 원래 값을 복원할 수 있게 함.
  // 이 코드는 결과가 확정되는 finishTyping() 시점에 딱 한 번만 만들어지므로,
  // 이후 화면 값(예: F12로 DOM 텍스트만 바꾼 경우)과 코드를 복호화한 값이 달라지면 조작 의심 신호가 됨.
  const CODE_SALT = 42;

  function xorTransform(str, salt){
    let out = "";
    for(let i = 0; i < str.length; i++){
      const shifted = str.charCodeAt(i) ^ (salt + (i % 97) + 7);
      out += String.fromCharCode(shifted);
    }
    return out;
  }

  function toBase64Unicode(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function fromBase64Unicode(b64){
    return decodeURIComponent(escape(atob(b64)));
  }

  function simpleChecksum(str){
    let sum = 0;
    for(let i = 0; i < str.length; i++){
      sum = (sum * 31 + str.charCodeAt(i)) >>> 0;
    }
    return (sum % 46656).toString(36).toUpperCase().padStart(3, '0'); // 3자리 체크섬
  }

  function encodeResultCode(data){
    const payload = JSON.stringify({
      n: data.nickname,
      s: data.speed,
      a: data.accuracy,
      t: data.elapsedSec,
      c: data.completedAt,
      salt: CODE_SALT
    });
    const scrambled = xorTransform(payload, CODE_SALT);
    const b64 = toBase64Unicode(scrambled).split('').reverse().join('');
    const checksum = simpleChecksum(b64);
    return `${checksum}-${b64}`;
  }

  retryBtn.addEventListener('click', () => {
    finished = false;
    startTime = null;
    timerEl.textContent = "0.0";

    currentLineIndex = 0;
    typedForLine = new Array(lines.length).fill("");
    totalCorrectJamo = 0;

    typeInput.value = "";
    typeInput.disabled = false;
    resultScreen.classList.remove('show');
    mainCard.classList.remove('wide');
    typeScreen.style.display = 'block';
    renderTrack();
    resetLiveStatsDisplay();
    setTimeout(() => typeInput.focus(), 50);
  });

  // 페이지 어디서든 드래그 시작을 막음 (텍스트/이미지 드래그 방지)
  document.addEventListener('dragstart', (e) => {
    e.preventDefault();
  });

  // 입력창(닉네임/타자 입력)의 정상적인 커서 동작만 허용하고, 그 외 모든 영역은 텍스트 선택 금지
  document.addEventListener('selectstart', (e) => {
    const target = e.target;
    const isTypingInput = target === typeInput || target === nickInput;
    if(!isTypingInput){
      e.preventDefault();
    }
  });

  // 복사(Ctrl+C/Cmd+C)와 붙여넣기(Ctrl+V/Cmd+V)를 페이지 전역에서 차단
  // (인증 코드는 "결과값 복사" 버튼을 통해서만 복사 가능)
  document.addEventListener('copy', (e) => {
    e.preventDefault();
  });
  document.addEventListener('paste', (e) => {
    e.preventDefault();
  });
  document.addEventListener('cut', (e) => {
    e.preventDefault();
  });
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const isCopyShortcut = (e.ctrlKey || e.metaKey) && (key === 'c' || key === 'x');
    if(isCopyShortcut){
      e.preventDefault();
    }
  });

  let toastTimer = null;
  function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 2200);
  }

  copyBtn.addEventListener('click', async () => {
    if(!lastResult) return;

    const dt = new Date(lastResult.completedAt);
    const formattedTime = isNaN(dt.getTime()) ? lastResult.completedAt : dt.toLocaleString('ko-KR');

    // 닉네임,타수,정확도,걸린시간,완료시각,인증코드 순 CSV 한 줄
    const csvRow = [
      lastResult.nickname,
      lastResult.speed,
      lastResult.accuracy,
      lastResult.elapsedSec,
      formattedTime,
      lastResult.code
    ].map(v => {
      const s = String(v);
      // CSV 규칙: 콤마/따옴표/줄바꿈이 있으면 큰따옴표로 감싸고 내부 따옴표는 두 번 씀
      if(/[",\n]/.test(s)){
        return `"${s.replace(/"/g, '""')}"`;
      }
      return s;
    }).join(",");

    try{
      await navigator.clipboard.writeText(csvRow);
      showToast("복사되었습니다!");
    }catch(e){
      // 클립보드 API 실패 시 폴백 (구형 브라우저 등)
      const textarea = document.createElement('textarea');
      textarea.value = csvRow;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try{
        document.execCommand('copy');
        showToast("복사되었습니다!");
      }catch(err){
        showToast("복사에 실패했습니다.");
      }
      document.body.removeChild(textarea);
    }
  });

})();
</script>
